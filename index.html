<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airficiency – Woolworths Installation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #8b949e;
    }

    .carousel-wrapper {
      position: relative;
      width: 100%;
      max-width: 560px;
    }

    .carousel {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      background: #161b22;
    }

    .slides {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide {
      min-width: 100%;
    }

    .slide img {
      width: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: 1 / 1;
    }

    /* Counter badge */
    .counter {
      position: absolute;
      top: 14px;
      right: 16px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }

    /* Arrow buttons */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
      z-index: 10;
    }

    .arrow:hover { background: rgba(255,255,255,0.25); }
    .arrow.prev { left: -20px; }
    .arrow.next { right: -20px; }

    /* Dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30363d;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: #1f6feb;
      transform: scale(1.3);
    }

    /* Caption */
    .caption {
      text-align: center;
      margin-top: 18px;
      font-size: 0.88rem;
      color: #8b949e;
      min-height: 20px;
    }

    footer {
      margin-top: 48px;
      font-size: 0.78rem;
      color: #30363d;
      text-align: center;
    }

    @media (max-width: 480px) {
      .arrow.prev { left: 6px; }
      .arrow.next { right: 6px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Airficiency – LinkedIn Carousel</h1>
    <p>Woolworths Edit Store HVAC Installation</p>
  </header>

  <div class="carousel-wrapper">
    <button class="arrow prev" onclick="move(-1)">&#8592;</button>

    <div class="carousel">
      <div class="slides" id="slides">
        <div class="slide"><img src="Post 1.png" alt="Woolworths Edit exterior with Airficiency branding" /></div>
        <div class="slide"><img src="Post 2.png" alt="Ceiling HVAC ducting installation inside Woolworths" /></div>
        <div class="slide"><img src="Post 3.png" alt="Ventilation system overview inside the store" /></div>
        <div class="slide"><img src="Post 4.png" alt="Completed aircon and refrigeration install" /></div>
      </div>
      <div class="counter" id="counter">1 / 4</div>
    </div>

    <button class="arrow next" onclick="move(1)">&#8594;</button>
  </div>

  <div class="dots" id="dots">
    <div class="dot active" onclick="goTo(0)"></div>
    <div class="dot" onclick="goTo(1)"></div>
    <div class="dot" onclick="goTo(2)"></div>
    <div class="dot" onclick="goTo(3)"></div>
  </div>

  <div class="caption" id="caption">Exterior – Woolworths Edit, Airficiency branding</div>

  <footer>Prepared by Airficiency &nbsp;·&nbsp; Airconditioning, Ventilation &amp; Refrigeration</footer>

  <script>
    const captions = [
      "Exterior – Woolworths Edit, Airficiency branding",
      "Ceiling HVAC ducting installation inside the store",
      "Ventilation system overview – full ceiling run",
      "Completed aircon and refrigeration installation"
    ];

    let current = 0;
    const total = 4;

    function update() {
      document.getElementById('slides').style.transform = `translateX(-${current * 100}%)`;
      document.getElementById('counter').textContent = `${current + 1} / ${total}`;
      document.getElementById('caption').textContent = captions[current];
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    }

    function move(dir) {
      current = (current + dir + total) % total;
      update();
    }

    function goTo(index) {
      current = index;
      update();
    }

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') move(-1);
      if (e.key === 'ArrowRight') move(1);
    });

    // Touch/swipe support
    let startX = 0;
    const el = document.getElementById('slides');
    el.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
    el.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
    });
  </script>

</body>
</html>
